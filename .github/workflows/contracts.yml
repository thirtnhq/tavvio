name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      contract_type:
        description: "Contract type to deploy"
        required: true
        type: choice
        options:
          - evm
          - soroban
      network:
        description: "Target network"
        required: true
        type: choice
        options:
          - testnet
          - mainnet
      evm_chain:
        description: "EVM chain (only for EVM deploys)"
        required: false
        type: choice
        options:
          - sepolia
          - base-sepolia
          - bsc-testnet
          - polygon-amoy
          - arbitrum-sepolia
          - avalanche-fuji
          - base
          - ethereum
          - polygon
          - arbitrum
          - avalanche

jobs:
  # ── Deploy EVM Contracts ─────────────────────────────────────────────────────
  deploy-evm:
    name: Deploy EVM – ${{ inputs.evm_chain }}
    runs-on: ubuntu-latest
    if: inputs.contract_type == 'evm'
    environment: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Compile contracts
        working-directory: contract/evm
        run: npx hardhat compile

      - name: Run tests before deploy
        working-directory: contract/evm
        run: npx hardhat test

      - name: Deploy HTLC
        working-directory: contract/evm
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: npx hardhat run scripts/deploy.ts --network ${{ inputs.evm_chain }}

      - name: Verify on explorer
        if: inputs.network == 'mainnet' || inputs.network == 'testnet'
        working-directory: contract/evm
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: npx hardhat verify --network ${{ inputs.evm_chain }} || true

  # ── Deploy Soroban Contracts ─────────────────────────────────────────────────
  deploy-soroban:
    name: Deploy Soroban – ${{ inputs.network }}
    runs-on: ubuntu-latest
    if: inputs.contract_type == 'soroban'
    environment: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/soroban/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contract/soroban/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Run tests
        working-directory: contract/soroban
        run: cargo test --workspace

      - name: Build optimized WASM
        working-directory: contract/soroban
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Deploy to Stellar
        working-directory: contract/soroban
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
          STELLAR_NETWORK: ${{ inputs.network }}
        run: |
          NETWORK_FLAG=""
          if [ "${{ inputs.network }}" = "testnet" ]; then
            NETWORK_FLAG="--network testnet"
          else
            NETWORK_FLAG="--network public"
          fi

          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            echo "Deploying $(basename $wasm)..."
            stellar contract deploy \
              --wasm "$wasm" \
              --source "$STELLAR_SECRET_KEY" \
              $NETWORK_FLAG
          done
